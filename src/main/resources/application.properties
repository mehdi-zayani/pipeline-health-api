# ===============================
# APPLICATION
# ===============================
spring.application.name=pipeline-health-api
app.version=1.0.0

# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# DATASOURCE (H2 - DEV)
# ===============================
spring.datasource.url=jdbc:h2:mem:pipeline-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DB_USERNAME:dev_user}
spring.datasource.password=${DB_PASSWORD:dev_password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# ===============================
# H2 CONSOLE
# ===============================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# GITLAB CONFIG
# ===============================
gitlab.url=${GITLAB_URL:https://gitlab.com/api/v4}
gitlab.project-id=${GITLAB_PROJECT_ID:81800243}

# ===============================
# RESILIENCE CONFIG
# ===============================
gitlab.retry.max-attempts=3
gitlab.retry.delay=1000

# ===============================
# SCHEDULER
# ===============================
health.refresh.rate=30000

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

# ===============================
# INFO ENDPOINT
# ===============================
info.app.name=${spring.application.name}
info.app.version=${app.version}
info.app.description=Health monitoring API with GitLab integration