# ===============================
# APPLICATION
# ===============================
spring.application.name=pipeline-health-api
app.version=1.0.0
# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# DATASOURCE (H2 - DEV)
# ===============================
spring.datasource.url=jdbc:h2:mem:pipeline-db
spring.datasource.driver-class-name=org.h2.Driver

# Credentials via variables d'environnement
spring.datasource.username=${DB_USERNAME:dev_user}
spring.datasource.password=${DB_PASSWORD:dev_password}

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# ===============================
# H2 CONSOLE
# ===============================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# GITLAB
# ===============================
gitlab.url=https://gitlab.com/api/v4
gitlab.project-id=81800243

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

# ENDPOINT INFO

info.app.name=pipeline-health-api
info.app.version=1.0.0
info.app.description=Health monitoring API with GitLab integration